<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src/assets/scrobbler_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>scrobbler dashboard</title>
    <style>
      /* Critical CSS - prevent FOUC */
      html, body {
        margin: 0;
        padding: 0;
      }
      body { 
        background: #f1f0e3;
      }
      /* Dark mode background */
      [data-theme="dark"] body {
        background: #1f1f1f;
      }
      /* Hide loading skeleton once React loads */
      #loading-skeleton {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 9999;
        pointer-events: none;
      }
      #root:not(:empty) ~ #loading-skeleton {
        display: none;
      }
    </style>
    <script>
      (function() {
        // Set theme before anything renders
        var theme = localStorage.getItem('theme')
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        if (theme === 'dark' || (!theme && prefersDark)) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="loading-skeleton"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
